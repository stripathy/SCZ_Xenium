name: scz_xenium
channels:
  - conda-forge
  - defaults
dependencies:
  - python>=3.10
  - anndata>=0.10
  - scanpy>=1.10
  - numpy>=1.24
  - scipy>=1.10
  - scikit-learn>=1.3
  - pandas>=2.0
  - matplotlib>=3.8
  - h5py>=3.10
  - openpyxl>=3.1
  - adjustText
  - statsmodels
  - pip:
    # MapMyCells label transfer (pipeline step 02)
    - "cell_type_mapper @ git+https://github.com/AllenInstitute/cell_type_mapper"

