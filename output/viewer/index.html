<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xenium SCZ Spatial Viewer</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; color: #e0e0e0; display: flex; height: 100vh; overflow: hidden; }

/* Sidebar */
#sidebar { width: 300px; background: #16213e; padding: 16px; overflow-y: auto; border-right: 1px solid #0f3460; display: flex; flex-direction: column; gap: 12px; }
#sidebar h1 { font-size: 18px; color: #e94560; margin-bottom: 4px; }
#sidebar h2 { font-size: 14px; font-weight: 600; color: #e94560; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1px; }
.section { background: #0f3460; border-radius: 8px; padding: 12px; }
.section label { font-size: 12px; color: #a0a0c0; display: block; margin-bottom: 4px; }

/* Sample selector */
#sample-list { display: flex; flex-wrap: wrap; gap: 4px; }
.sample-btn { padding: 4px 8px; font-size: 11px; border: 1px solid #333; border-radius: 4px; cursor: pointer; background: #1a1a2e; color: #ccc; transition: all 0.15s; }
.sample-btn:hover { background: #333; }
.sample-btn.active { background: #e94560; color: white; border-color: #e94560; }
.sample-btn.control { border-left: 3px solid #4ecdc4; }
.sample-btn.scz { border-left: 3px solid #e94560; }

/* Color mode */
.color-mode-btns { display: flex; gap: 4px; flex-wrap: wrap; }
.mode-btn { padding: 5px 10px; font-size: 12px; border: 1px solid #333; border-radius: 4px; cursor: pointer; background: #1a1a2e; color: #ccc; }
.mode-btn:hover { background: #333; }
.mode-btn.active { background: #533483; color: white; border-color: #533483; }

/* Cell type filter */
#celltype-filter { max-height: 280px; overflow-y: auto; }
.ct-row { display: flex; align-items: center; gap: 6px; padding: 2px 0; cursor: pointer; font-size: 12px; }
.ct-row:hover { background: rgba(255,255,255,0.05); }
.ct-swatch { width: 14px; height: 14px; border-radius: 3px; flex-shrink: 0; }
.ct-label { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ct-count { font-size: 10px; color: #888; }
.ct-row.dimmed .ct-label { color: #555; }
input[type="checkbox"] { accent-color: #e94560; }

/* Filter controls */
.filter-bar { display: flex; gap: 4px; margin-bottom: 6px; }
.filter-bar button { padding: 3px 8px; font-size: 11px; border: 1px solid #333; border-radius: 3px; cursor: pointer; background: #1a1a2e; color: #aaa; }
.filter-bar button:hover { background: #333; }

/* Info panel */
#info { font-size: 12px; color: #aaa; line-height: 1.6; }
#info .val { color: #e0e0e0; font-weight: 600; }

/* Point size slider */
input[type="range"] { width: 100%; accent-color: #e94560; }

/* Main canvas area */
#main { flex: 1; position: relative; background: #0d0d1a; }
canvas { position: absolute; top: 0; left: 0; }

/* Status bar */
#status { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(22,33,62,0.9); padding: 6px 12px; font-size: 11px; color: #888; display: flex; justify-content: space-between; }

/* Loading overlay */
#loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); font-size: 16px; color: #e94560; display: none; }
#loading.show { display: block; }

/* Tooltip */
#tooltip { position: absolute; background: rgba(22,33,62,0.95); border: 1px solid #e94560; border-radius: 6px; padding: 8px 12px; font-size: 12px; pointer-events: none; display: none; z-index: 100; max-width: 250px; }
#tooltip .tt-label { font-weight: 700; color: #e94560; }

/* Legend */
#legend-overlay { position: absolute; top: 10px; right: 10px; background: rgba(22,33,62,0.9); border-radius: 8px; padding: 10px; font-size: 11px; max-height: 50vh; overflow-y: auto; }
#legend-overlay .leg-title { font-weight: 700; color: #e94560; margin-bottom: 4px; }
.leg-row { display: flex; align-items: center; gap: 5px; padding: 1px 0; }
.leg-swatch { width: 10px; height: 10px; border-radius: 2px; }
</style>
</head>
<body>

<div id="sidebar">
  <div>
    <h1>Xenium SCZ Viewer</h1>
    <div style="font-size:11px; color:#888;">24 DLPFC sections | 1.3M cells</div>
  </div>

  <div class="section">
    <h2>Section</h2>
    <div style="margin-bottom:6px; font-size:11px;">
      <span style="color:#4ecdc4;">&#9632;</span> Control (n=12) &nbsp;
      <span style="color:#e94560;">&#9632;</span> SCZ (n=12)
    </div>
    <div id="sample-list"></div>
  </div>

  <div class="section">
    <h2>Color By</h2>
    <div class="color-mode-btns" id="color-modes">
      <button class="mode-btn active" data-mode="subclass">Subclass</button>
      <button class="mode-btn" data-mode="supertype">Supertype</button>
      <button class="mode-btn" data-mode="class">Class</button>
      <button class="mode-btn" data-mode="layer">Layer</button>
      <button class="mode-btn" data-mode="depth">Depth</button>
    </div>
  </div>

  <div class="section" style="flex:1; min-height:0; display:flex; flex-direction:column;">
    <h2>Cell Types</h2>
    <div class="filter-bar">
      <button onclick="selectAllTypes()">All</button>
      <button onclick="selectNoneTypes()">None</button>
      <button onclick="selectNeurons()">Neurons</button>
      <button onclick="selectGlia()">Glia</button>
    </div>
    <div id="celltype-filter" style="flex:1; overflow-y:auto;"></div>
  </div>

  <div class="section">
    <h2>Display</h2>
    <label>Point size: <span id="size-val">2</span></label>
    <input type="range" id="point-size" min="1" max="8" value="2" step="0.5">
    <label style="margin-top:6px;">Opacity: <span id="opacity-val">0.8</span></label>
    <input type="range" id="point-opacity" min="0.1" max="1" value="0.8" step="0.05">
    <div style="margin-top:8px; display:flex; align-items:center; gap:8px;">
      <label style="margin:0; cursor:pointer; display:flex; align-items:center; gap:4px;">
        <input type="checkbox" id="layer-overlay-toggle">
        <span>Show layer regions</span>
      </label>
    </div>
  </div>

  <div class="section">
    <div id="info">
      <div>Sample: <span class="val" id="info-sample">-</span></div>
      <div>Diagnosis: <span class="val" id="info-dx">-</span></div>
      <div>Cells shown: <span class="val" id="info-shown">-</span></div>
      <div>Total cells: <span class="val" id="info-total">-</span></div>
    </div>
  </div>
</div>

<div id="main">
  <canvas id="canvas"></canvas>
  <div id="loading" class="show">Loading...</div>
  <div id="tooltip"></div>
  <div id="legend-overlay"></div>
  <div id="status">
    <span id="status-left">Scroll to zoom | Drag to pan | Hover for info | L=layers</span>
    <span id="status-right"></span>
  </div>
</div>

<script>
// ── State ──
let currentSample = null;
let sampleData = null;
let indexData = null;
let colorMode = 'subclass';
let activeTypes = new Set();
let pointSize = 2;
let pointOpacity = 0.8;

// View transform
let viewX = 0, viewY = 0, viewScale = 1;
let isDragging = false;
let dragStartX, dragStartY, dragViewX, dragViewY;

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

// ── Depth colormap (viridis-like) ──
function depthColor(d) {
  d = Math.max(0, Math.min(1, d));
  const r = Math.round(68 + d * (253 - 68));
  const g = Math.round(1 + d * (231 - 1));
  const b = Math.round(84 + d * (37 - 84));
  return `rgb(${r},${g},${b})`;
}

// Precompute depth colors
const DEPTH_LUT = [];
for (let i = 0; i <= 256; i++) {
  DEPTH_LUT.push(depthColor(i / 256));
}

// ── Neuron/glia classification ──
const GLIA_TYPES = new Set(['Astrocyte', 'Oligodendrocyte', 'OPC', 'Microglia-PVM', 'Endothelial', 'VLMC']);
const NEURON_TYPES = new Set(['L2/3 IT','L4 IT','L5 IT','L5 ET','L5/6 NP','L6 IT','L6 IT Car3','L6 CT','L6b',
  'Sst','Sst Chodl','Pvalb','Vip','Lamp5','Lamp5 Lhx6','Sncg','Pax6','Chandelier']);

// ── Supertype → Subclass resolution ──
// Maps abbreviated supertype prefixes to their canonical subclass names
const SUPERTYPE_SUBCLASS_FALLBACK = {
  'Astro': 'Astrocyte', 'Oligo': 'Oligodendrocyte', 'Micro-PVM': 'Microglia-PVM',
  'Endo': 'Endothelial', 'Pericyte': 'VLMC', 'SMC': 'VLMC',
};

function supertypeToSubclass(supertype) {
  // Try using the map from index.json first
  const stMap = (indexData && indexData.supertype_subclass_map) || {};
  // Strip trailing _N, _N_N-SEAAD, -SEAAD patterns to get the base
  const base = supertype.replace(/[-_]\d+(?:[-_]\d+)*(?:-SEAAD)?$/, '').replace(/-SEAAD$/, '');
  // Direct match in subclass_colors?
  const palette = (indexData && indexData.subclass_colors) || {};
  if (palette[base]) return base;
  if (palette[supertype]) return supertype;
  // Check fallback map
  if (stMap[base]) return stMap[base];
  if (SUPERTYPE_SUBCLASS_FALLBACK[base]) return SUPERTYPE_SUBCLASS_FALLBACK[base];
  return base;
}

// ── Distinct color generation for supertypes ──
function hexToHSL(hex) {
  let r = parseInt(hex.slice(1,3), 16) / 255;
  let g = parseInt(hex.slice(3,5), 16) / 255;
  let b = parseInt(hex.slice(5,7), 16) / 255;
  const max = Math.max(r,g,b), min = Math.min(r,g,b);
  let h, s, l = (max + min) / 2;
  if (max === min) { h = s = 0; }
  else {
    const d = max - min;
    s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
    if (max === r) h = ((g - b) / d + (g < b ? 6 : 0)) / 6;
    else if (max === g) h = ((b - r) / d + 2) / 6;
    else h = ((r - g) / d + 4) / 6;
  }
  return [h * 360, s * 100, l * 100];
}

function hslToCSS(h, s, l) {
  return `hsl(${h.toFixed(0)}, ${s.toFixed(0)}%, ${l.toFixed(0)}%)`;
}

function generateSupertypeColor(supertype, supertypeList) {
  const subclass = supertypeToSubclass(supertype);
  const palette = (indexData && indexData.subclass_colors) || {};
  const baseHex = palette[subclass] || '#666666';
  const [baseH, baseS, baseL] = hexToHSL(baseHex);

  // Find all supertypes sharing this subclass
  const siblings = supertypeList.filter(st => supertypeToSubclass(st) === subclass);
  const idx = siblings.indexOf(supertype);
  const n = siblings.length;

  if (n <= 1) return hslToCSS(baseH, baseS, baseL);

  // Spread hue +-20deg around base, vary lightness +-15%
  const hueSpread = Math.min(40, 15 * n);
  const hueShift = (idx / (n - 1) - 0.5) * hueSpread;
  const lightShift = (idx / (n - 1) - 0.5) * 30;

  const h = (baseH + hueShift + 360) % 360;
  const s = Math.max(20, Math.min(100, baseS));
  const l = Math.max(25, Math.min(85, baseL + lightShift));

  return hslToCSS(h, s, l);
}

// Layer overlay state
let showLayerOverlay = false;

// ── Init ──
async function init() {
  const resp = await fetch('index.json');
  indexData = await resp.json();
  buildSampleList();
  setupEvents();
  resizeCanvas();
  // Load first sample
  loadSample(indexData.samples[0].sample_id);
}

function buildSampleList() {
  const el = document.getElementById('sample-list');
  // Sort: controls first, then SCZ
  const controls = indexData.samples.filter(s => s.diagnosis === 'Control').sort((a,b) => a.sample_id.localeCompare(b.sample_id));
  const scz = indexData.samples.filter(s => s.diagnosis === 'SCZ').sort((a,b) => a.sample_id.localeCompare(b.sample_id));

  [...controls, ...scz].forEach(s => {
    const btn = document.createElement('button');
    btn.className = `sample-btn ${s.diagnosis.toLowerCase()}`;
    btn.textContent = s.sample_id;
    btn.dataset.sample = s.sample_id;
    btn.onclick = () => loadSample(s.sample_id);
    el.appendChild(btn);
  });
}

async function loadSample(sampleId) {
  const loading = document.getElementById('loading');
  loading.classList.add('show');

  // Update button states
  document.querySelectorAll('.sample-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.sample === sampleId);
  });

  currentSample = sampleId;

  const resp = await fetch(`${sampleId}.json`);
  sampleData = await resp.json();

  // Pre-compute category colors for current color mode
  precomputeColors();

  // Build cell type filter
  buildCellTypeFilter();

  // Reset view to fit
  fitView();

  // Update info
  document.getElementById('info-sample').textContent = sampleId;
  document.getElementById('info-dx').textContent = sampleData.diagnosis;
  document.getElementById('info-dx').style.color = sampleData.diagnosis === 'SCZ' ? '#e94560' : '#4ecdc4';
  document.getElementById('info-total').textContent = sampleData.n_cells.toLocaleString();

  loading.classList.remove('show');
  render();
}

function precomputeColors() {
  if (!sampleData) return;

  const n = sampleData.n_cells;
  sampleData._colors = new Array(n);

  if (colorMode === 'subclass') {
    const cats = sampleData.subclass_cats;
    const palette = indexData.subclass_colors;
    const catColors = cats.map(c => palette[c] || '#666');
    for (let i = 0; i < n; i++) {
      sampleData._colors[i] = catColors[sampleData.subclass[i]];
    }
  } else if (colorMode === 'supertype') {
    // Generate distinct colors for supertypes using hue/lightness variation
    const cats = sampleData.supertype_cats;
    const catColors = cats.map(c => generateSupertypeColor(c, cats));
    for (let i = 0; i < n; i++) {
      sampleData._colors[i] = catColors[sampleData.supertype[i]];
    }
  } else if (colorMode === 'class') {
    const cats = sampleData.class_cats;
    const palette = indexData.class_colors;
    const catColors = cats.map(c => palette[c] || '#666');
    for (let i = 0; i < n; i++) {
      sampleData._colors[i] = catColors[sampleData.class[i]];
    }
  } else if (colorMode === 'layer') {
    const cats = sampleData.layer_cats;
    const palette = indexData.layer_colors;
    const catColors = cats.map(c => palette[c] || '#444');
    for (let i = 0; i < n; i++) {
      const li = sampleData.layer[i];
      sampleData._colors[i] = li < catColors.length ? catColors[li] : '#444';
    }
  } else if (colorMode === 'depth') {
    for (let i = 0; i < n; i++) {
      const d = Math.max(0, Math.min(1, sampleData.depth[i]));
      const idx = Math.round(d * 256);
      sampleData._colors[i] = DEPTH_LUT[idx];
    }
  }
}

function adjustBrightness(hex, factor) {
  const r = Math.min(255, Math.round(parseInt(hex.slice(1,3), 16) * factor));
  const g = Math.min(255, Math.round(parseInt(hex.slice(3,5), 16) * factor));
  const b = Math.min(255, Math.round(parseInt(hex.slice(5,7), 16) * factor));
  return `rgb(${r},${g},${b})`;
}

function buildCellTypeFilter() {
  const el = document.getElementById('celltype-filter');
  el.innerHTML = '';

  if (!sampleData) return;

  // Get categories based on color mode
  let cats, indices;
  if (colorMode === 'supertype') {
    cats = sampleData.supertype_cats;
    indices = sampleData.supertype;
  } else if (colorMode === 'layer') {
    cats = sampleData.layer_cats;
    indices = sampleData.layer;
  } else if (colorMode === 'class') {
    cats = sampleData.class_cats;
    indices = sampleData.class;
  } else {
    // subclass, depth filter by subclass
    cats = sampleData.subclass_cats;
    indices = sampleData.subclass;
  }

  // Count cells per category
  const counts = new Array(cats.length).fill(0);
  for (let i = 0; i < indices.length; i++) counts[indices[i]]++;

  // Init active types on first load only (not after explicit None)
  if (activeTypes.size === 0 && !activeTypes._explicitEmpty) {
    cats.forEach(c => activeTypes.add(c));
  }

  // Sort alphabetically
  const sorted = cats.map((c, i) => ({name: c, count: counts[i], idx: i}))
    .sort((a, b) => a.name.localeCompare(b.name));

  sorted.forEach(({name, count}) => {
    const row = document.createElement('div');
    row.className = 'ct-row' + (activeTypes.has(name) ? '' : ' dimmed');

    const cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.checked = activeTypes.has(name);
    cb.onchange = () => {
      if (cb.checked) activeTypes.add(name);
      else activeTypes.delete(name);
      row.classList.toggle('dimmed', !cb.checked);
      render();
    };

    let color;
    if (colorMode === 'supertype') {
      color = generateSupertypeColor(name, cats);
    } else {
      const palette = colorMode === 'layer' ? indexData.layer_colors :
                      colorMode === 'class' ? indexData.class_colors :
                      indexData.subclass_colors;
      color = palette[name] || '#666';
    }

    const swatch = document.createElement('div');
    swatch.className = 'ct-swatch';
    swatch.style.background = color;

    const label = document.createElement('span');
    label.className = 'ct-label';
    label.textContent = name;

    const countEl = document.createElement('span');
    countEl.className = 'ct-count';
    countEl.textContent = count.toLocaleString();

    row.appendChild(cb);
    row.appendChild(swatch);
    row.appendChild(label);
    row.appendChild(countEl);

    row.onclick = (e) => {
      if (e.target === cb) return;
      cb.checked = !cb.checked;
      cb.onchange();
    };

    el.appendChild(row);
  });
}

function getFilterCats() {
  if (colorMode === 'supertype') return sampleData.supertype_cats;
  if (colorMode === 'layer') return sampleData.layer_cats;
  if (colorMode === 'class') return sampleData.class_cats;
  return sampleData.subclass_cats;
}

function selectAllTypes() {
  activeTypes = new Set(getFilterCats());
  buildCellTypeFilter();
  render();
}

function selectNoneTypes() {
  activeTypes = new Set();
  activeTypes._explicitEmpty = true;
  buildCellTypeFilter();
  render();
}

function selectNeurons() {
  activeTypes = new Set();
  activeTypes._explicitEmpty = true;
  const cats = getFilterCats();
  cats.forEach(c => {
    const parent = supertypeToSubclass(c);
    if (NEURON_TYPES.has(parent) || NEURON_TYPES.has(c)) activeTypes.add(c);
  });
  if (activeTypes.size > 0) delete activeTypes._explicitEmpty;
  buildCellTypeFilter();
  render();
}

function selectGlia() {
  activeTypes = new Set();
  activeTypes._explicitEmpty = true;
  const cats = getFilterCats();
  cats.forEach(c => {
    const parent = supertypeToSubclass(c);
    if (GLIA_TYPES.has(parent) || GLIA_TYPES.has(c)) activeTypes.add(c);
  });
  if (activeTypes.size > 0) delete activeTypes._explicitEmpty;
  buildCellTypeFilter();
  render();
}

// ── View ──
function fitView() {
  if (!sampleData) return;
  const w = canvas.width;
  const h = canvas.height - 30; // status bar
  const dx = sampleData.x_range[1] - sampleData.x_range[0];
  const dy = sampleData.y_range[1] - sampleData.y_range[0];
  viewScale = Math.min(w / dx, h / dy) * 0.9;
  viewX = (w - dx * viewScale) / 2 - sampleData.x_range[0] * viewScale;
  viewY = (h - dy * viewScale) / 2 - sampleData.y_range[0] * viewScale;
}

function resizeCanvas() {
  const main = document.getElementById('main');
  canvas.width = main.clientWidth;
  canvas.height = main.clientHeight;
  if (sampleData) {
    fitView();
    render();
  }
}

// ── Layer overlay rendering ──
function renderLayerOverlay() {
  if (!sampleData || !showLayerOverlay) return;

  const w = canvas.width;
  const h = canvas.height;
  const n = sampleData.n_cells;
  const x = sampleData.x;
  const y = sampleData.y;
  const layerIndices = sampleData.layer;
  const layerCats = sampleData.layer_cats;
  const layerPalette = indexData.layer_colors;

  // Determine grid resolution in data space (~50px bins in screen space)
  const binScreenSize = 50;
  const binDataSize = binScreenSize / viewScale;

  const xMin = sampleData.x_range[0];
  const xMax = sampleData.x_range[1];
  const yMin = sampleData.y_range[0];
  const yMax = sampleData.y_range[1];

  const nBinsX = Math.max(1, Math.ceil((xMax - xMin) / binDataSize));
  const nBinsY = Math.max(1, Math.ceil((yMax - yMin) / binDataSize));

  // Cap grid size for performance
  const maxBins = 200;
  const binsX = Math.min(nBinsX, maxBins);
  const binsY = Math.min(nBinsY, maxBins);
  const stepX = (xMax - xMin) / binsX;
  const stepY = (yMax - yMin) / binsY;

  // Count layer occurrences per bin
  const nLayers = layerCats.length;
  const grid = new Uint16Array(binsX * binsY * nLayers);

  for (let i = 0; i < n; i++) {
    const bx = Math.min(binsX - 1, Math.max(0, Math.floor((x[i] - xMin) / stepX)));
    const by = Math.min(binsY - 1, Math.max(0, Math.floor((y[i] - yMin) / stepY)));
    const li = layerIndices[i];
    if (li >= 0 && li < nLayers) {
      grid[(by * binsX + bx) * nLayers + li]++;
    }
  }

  // Draw bins colored by dominant layer
  ctx.globalAlpha = 0.15;

  for (let by = 0; by < binsY; by++) {
    for (let bx = 0; bx < binsX; bx++) {
      // Find dominant layer in this bin
      let maxCount = 0;
      let dominantLayer = -1;
      const offset = (by * binsX + bx) * nLayers;
      let totalCount = 0;
      for (let li = 0; li < nLayers; li++) {
        const c = grid[offset + li];
        totalCount += c;
        if (c > maxCount) { maxCount = c; dominantLayer = li; }
      }
      if (totalCount < 2) continue;  // skip empty/sparse bins

      const layerName = layerCats[dominantLayer];
      const color = layerPalette[layerName];
      if (!color) continue;

      // Convert data coords to screen coords
      const sx = (xMin + bx * stepX) * viewScale + viewX;
      const sy = (yMin + by * stepY) * viewScale + viewY;
      const sw = stepX * viewScale;
      const sh = stepY * viewScale;

      // Skip if completely off-screen
      if (sx + sw < 0 || sx > w || sy + sh < 0 || sy > h) continue;

      ctx.fillStyle = color;
      ctx.fillRect(sx, sy, sw, sh);
    }
  }

  ctx.globalAlpha = 1;
}

// ── Render ──
function render() {
  if (!sampleData) return;

  const w = canvas.width;
  const h = canvas.height;

  ctx.fillStyle = '#0d0d1a';
  ctx.fillRect(0, 0, w, h);

  // Draw layer overlay behind cells
  renderLayerOverlay();

  const n = sampleData.n_cells;
  const x = sampleData.x;
  const y = sampleData.y;
  const colors = sampleData._colors;

  // Determine which cells are active
  let filterCats, filterIndices;
  if (colorMode === 'supertype') {
    filterCats = sampleData.supertype_cats;
    filterIndices = sampleData.supertype;
  } else if (colorMode === 'layer') {
    filterCats = sampleData.layer_cats;
    filterIndices = sampleData.layer;
  } else if (colorMode === 'class') {
    filterCats = sampleData.class_cats;
    filterIndices = sampleData.class;
  } else {
    filterCats = sampleData.subclass_cats;
    filterIndices = sampleData.subclass;
  }

  const activeSet = new Set();
  filterCats.forEach((c, i) => { if (activeTypes.has(c)) activeSet.add(i); });

  const r = pointSize;
  let shown = 0;

  // Batch render by color for performance
  const colorBuckets = {};

  for (let i = 0; i < n; i++) {
    if (!activeSet.has(filterIndices[i])) continue;

    const sx = x[i] * viewScale + viewX;
    const sy = y[i] * viewScale + viewY;

    if (sx < -r || sx > w + r || sy < -r || sy > h + r) continue;

    const c = colors[i];
    if (!colorBuckets[c]) colorBuckets[c] = [];
    colorBuckets[c].push(sx, sy);
    shown++;
  }

  ctx.globalAlpha = pointOpacity;

  for (const [color, pts] of Object.entries(colorBuckets)) {
    ctx.fillStyle = color;
    for (let i = 0; i < pts.length; i += 2) {
      ctx.fillRect(pts[i] - r/2, pts[i+1] - r/2, r, r);
    }
  }

  ctx.globalAlpha = 1;

  document.getElementById('info-shown').textContent = shown.toLocaleString();
  document.getElementById('status-right').textContent = `Zoom: ${viewScale.toFixed(1)}x | ${shown.toLocaleString()} cells`;

  updateLegend();
}

function updateLegend() {
  const el = document.getElementById('legend-overlay');
  let html = '';

  if (colorMode === 'depth') {
    html += `
      <div class="leg-title">Cortical Depth</div>
      <div style="display:flex; align-items:center; gap:6px;">
        <span style="font-size:10px;">Pia (0)</span>
        <div style="width:100px; height:12px; background: linear-gradient(to right, rgb(68,1,84), rgb(59,82,139), rgb(33,145,140), rgb(94,201,98), rgb(253,231,37)); border-radius:2px;"></div>
        <span style="font-size:10px;">WM (1)</span>
      </div>
    `;
  } else if (colorMode === 'layer') {
    const palette = indexData.layer_colors;
    html += '<div class="leg-title">Cortical Layer</div>' +
      Object.entries(palette).map(([k,v]) =>
        `<div class="leg-row"><div class="leg-swatch" style="background:${v}"></div><span>${k}</span></div>`
      ).join('');
  } else if (colorMode === 'class') {
    const palette = indexData.class_colors;
    html += '<div class="leg-title">Cell Class</div>' +
      Object.entries(palette).map(([k,v]) =>
        `<div class="leg-row"><div class="leg-swatch" style="background:${v}"></div><span>${k}</span></div>`
      ).join('');
  }

  // Show layer legend when overlay is active (any color mode)
  if (showLayerOverlay && colorMode !== 'layer') {
    const palette = indexData.layer_colors;
    if (html) html += '<div style="margin-top:8px; border-top:1px solid #333; padding-top:6px;"></div>';
    html += '<div class="leg-title">Layer Overlay</div>' +
      Object.entries(palette).map(([k,v]) =>
        `<div class="leg-row"><div class="leg-swatch" style="background:${v}; opacity:0.4;"></div><span>${k}</span></div>`
      ).join('');
  }

  el.innerHTML = html;
}

// ── Events ──
function setupEvents() {
  // Color mode buttons
  document.querySelectorAll('.mode-btn').forEach(btn => {
    btn.onclick = () => {
      document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      colorMode = btn.dataset.mode;
      // Reset active types for new mode
      activeTypes = new Set();
      precomputeColors();
      buildCellTypeFilter();
      render();
    };
  });

  // Point size
  document.getElementById('point-size').oninput = (e) => {
    pointSize = parseFloat(e.target.value);
    document.getElementById('size-val').textContent = pointSize;
    render();
  };

  // Opacity
  document.getElementById('point-opacity').oninput = (e) => {
    pointOpacity = parseFloat(e.target.value);
    document.getElementById('opacity-val').textContent = pointOpacity;
    render();
  };

  // Layer overlay toggle
  document.getElementById('layer-overlay-toggle').onchange = (e) => {
    showLayerOverlay = e.target.checked;
    render();
  };

  // Pan
  canvas.addEventListener('mousedown', (e) => {
    isDragging = true;
    dragStartX = e.clientX;
    dragStartY = e.clientY;
    dragViewX = viewX;
    dragViewY = viewY;
    canvas.style.cursor = 'grabbing';
  });

  window.addEventListener('mousemove', (e) => {
    if (isDragging) {
      viewX = dragViewX + (e.clientX - dragStartX);
      viewY = dragViewY + (e.clientY - dragStartY);
      render();
    } else {
      handleHover(e);
    }
  });

  window.addEventListener('mouseup', () => {
    isDragging = false;
    canvas.style.cursor = 'crosshair';
  });

  // Zoom
  canvas.addEventListener('wheel', (e) => {
    e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;

    const factor = e.deltaY < 0 ? 1.15 : 1 / 1.15;
    const newScale = viewScale * factor;

    // Zoom toward mouse position
    viewX = mx - (mx - viewX) * factor;
    viewY = my - (my - viewY) * factor;
    viewScale = newScale;

    render();
  }, { passive: false });

  // Double-click to reset view
  canvas.addEventListener('dblclick', () => {
    fitView();
    render();
  });

  // Resize
  window.addEventListener('resize', resizeCanvas);

  // Keyboard shortcuts
  window.addEventListener('keydown', (e) => {
    if (e.key === 'r') { fitView(); render(); }
    if (e.key === 'a') { selectAllTypes(); }
    if (e.key === 'n') { selectNeurons(); }
    if (e.key === 'g') { selectGlia(); }
    if (e.key === 'l') {
      showLayerOverlay = !showLayerOverlay;
      document.getElementById('layer-overlay-toggle').checked = showLayerOverlay;
      render();
    }

    // Navigate samples with arrow keys
    if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
      const samples = indexData.samples.map(s => s.sample_id);
      const idx = samples.indexOf(currentSample);
      const newIdx = e.key === 'ArrowRight' ?
        Math.min(idx + 1, samples.length - 1) : Math.max(idx - 1, 0);
      if (newIdx !== idx) loadSample(samples[newIdx]);
    }
  });
}

// ── Hover tooltip ──
let hoverTimeout;
function handleHover(e) {
  if (!sampleData || isDragging) return;

  clearTimeout(hoverTimeout);
  hoverTimeout = setTimeout(() => {
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;

    // Find nearest cell
    const threshold = Math.max(5, pointSize * 2);
    let bestDist = threshold * threshold;
    let bestIdx = -1;

    const n = sampleData.n_cells;
    const x = sampleData.x;
    const y = sampleData.y;

    // Only check visible cells
    let filterCats, filterIndices;
    if (colorMode === 'supertype') {
      filterCats = sampleData.supertype_cats;
      filterIndices = sampleData.supertype;
    } else if (colorMode === 'layer') {
      filterCats = sampleData.layer_cats;
      filterIndices = sampleData.layer;
    } else if (colorMode === 'class') {
      filterCats = sampleData.class_cats;
      filterIndices = sampleData.class;
    } else {
      filterCats = sampleData.subclass_cats;
      filterIndices = sampleData.subclass;
    }
    const activeSet = new Set();
    filterCats.forEach((c, i) => { if (activeTypes.has(c)) activeSet.add(i); });

    for (let i = 0; i < n; i++) {
      if (!activeSet.has(filterIndices[i])) continue;
      const sx = x[i] * viewScale + viewX;
      const sy = y[i] * viewScale + viewY;
      const dx = mx - sx;
      const dy = my - sy;
      const d2 = dx * dx + dy * dy;
      if (d2 < bestDist) { bestDist = d2; bestIdx = i; }
    }

    const tooltip = document.getElementById('tooltip');
    if (bestIdx >= 0) {
      const subclass = sampleData.subclass_cats[sampleData.subclass[bestIdx]];
      const supertype = sampleData.supertype_cats[sampleData.supertype[bestIdx]];
      const cls = sampleData.class_cats[sampleData.class[bestIdx]];
      const depth = sampleData.depth[bestIdx];
      const layerIdx = sampleData.layer[bestIdx];
      const layer = sampleData.layer_cats[layerIdx] || 'Outside';
      const layerColor = indexData.layer_colors[layer] || '#888';

      tooltip.innerHTML = `
        <div class="tt-label">${supertype}</div>
        <div>Subclass: ${subclass}</div>
        <div>Class: ${cls}</div>
        <div>Layer: <span style="color:${layerColor}; font-weight:700;">${layer}</span></div>
        <div>Depth: ${depth.toFixed(3)}</div>
        <div style="color:#666; font-size:10px;">x=${sampleData.x[bestIdx]}, y=${sampleData.y[bestIdx]}</div>
      `;
      tooltip.style.display = 'block';
      tooltip.style.left = (e.clientX - document.getElementById('sidebar').offsetWidth + 12) + 'px';
      tooltip.style.top = (e.clientY - 60) + 'px';
    } else {
      tooltip.style.display = 'none';
    }
  }, 50);
}

// ── Start ──
canvas.style.cursor = 'crosshair';
init();
</script>
